# Patch to add csi-snapshotter sidecar to the controller Deployment
# Usage: kubectl patch deployment proxmox-csi-controller -n kube-system --type=strategic --patch-file deploy/snapshots/controller-patch.yaml
spec:
  template:
    spec:
      containers:
        - name: csi-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.2.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--v=5"
            - "--leader-election=true"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
